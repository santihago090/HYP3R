<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYP3R — Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --navy: #0d1b2a;
            --navy-mid: #162032;
            --garnet: #6b1a2a;
            --garnet-light: #8b2a3d;
            --gold: #c9a84c;
            --gold-light: #e0c068;
            --cream: #f5f0e8;
            --cream-dark: #e8e0d0;
            --neutral: #a89880;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--navy);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Background texture */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(107,26,42,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 60% 80%, rgba(13,27,42,0.8) 0%, transparent 70%);
            pointer-events: none;
        }

        /* Decorative lines */
        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-image:
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 80px,
                    rgba(201,168,76,0.03) 80px,
                    rgba(201,168,76,0.03) 81px
                );
            pointer-events: none;
        }

        .corner-ornament {
            position: fixed;
            width: 120px;
            height: 120px;
            opacity: 0.25;
        }
        .corner-ornament.tl { top: 20px; left: 20px; border-top: 1px solid var(--gold); border-left: 1px solid var(--gold); }
        .corner-ornament.tr { top: 20px; right: 20px; border-top: 1px solid var(--gold); border-right: 1px solid var(--gold); }
        .corner-ornament.bl { bottom: 20px; left: 20px; border-bottom: 1px solid var(--gold); border-left: 1px solid var(--gold); }
        .corner-ornament.br { bottom: 20px; right: 20px; border-bottom: 1px solid var(--gold); border-right: 1px solid var(--gold); }

        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 420px;
            padding: 0 24px;
            animation: fadeUp 0.9s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand {
            text-align: center;
            margin-bottom: 48px;
            animation: fadeUp 0.9s 0.1s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .brand-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 52px;
            font-weight: 300;
            letter-spacing: 12px;
            color: var(--cream);
            text-transform: uppercase;
            line-height: 1;
            margin-bottom: 8px;
        }

        .brand-logo span {
            color: var(--gold);
        }

        .brand-tagline {
            font-size: 9px;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--neutral);
            font-weight: 400;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 40px;
        }
        .divider-line { flex: 1; height: 1px; background: linear-gradient(to right, transparent, var(--gold), transparent); opacity: 0.4; }
        .divider-diamond {
            width: 6px; height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
            opacity: 0.6;
        }

        .card {
            background: rgba(22, 32, 50, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(201,168,76,0.15);
            padding: 48px 40px;
            position: relative;
            animation: fadeUp 0.9s 0.2s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px; height: 1px;
            background: var(--gold);
            opacity: 0.6;
        }

        .card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            font-weight: 300;
            font-style: italic;
            color: var(--cream-dark);
            text-align: center;
            margin-bottom: 36px;
            letter-spacing: 2px;
        }

        .flash-messages {
            margin-bottom: 24px;
        }
        .flash-msg {
            padding: 10px 14px;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-left: 2px solid;
        }
        .flash-msg.error { color: #e07070; border-color: #e07070; background: rgba(224,112,112,0.08); }
        .flash-msg.exito { color: var(--gold); border-color: var(--gold); background: rgba(201,168,76,0.08); }

        .field {
            margin-bottom: 24px;
        }

        .field label {
            display: block;
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--neutral);
            margin-bottom: 10px;
        }

        .field input {
            width: 100%;
            background: rgba(13,27,42,0.6);
            border: 1px solid rgba(201,168,76,0.2);
            border-bottom: 1px solid rgba(201,168,76,0.4);
            color: var(--cream);
            padding: 14px 16px;
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 1px;
            outline: none;
            transition: all 0.3s ease;
        }

        .field input:focus {
            border-color: rgba(201,168,76,0.7);
            background: rgba(13,27,42,0.9);
            box-shadow: 0 0 0 3px rgba(201,168,76,0.05);
        }

        .field input::placeholder { color: rgba(168,152,128,0.4); }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--garnet), var(--garnet-light));
            border: 1px solid rgba(201,168,76,0.3);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            font-size: 10px;
            font-weight: 500;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            margin-top: 8px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(201,168,76,0.15), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover { background: linear-gradient(135deg, var(--garnet-light), #a03348); border-color: rgba(201,168,76,0.6); }
        .btn-submit:hover::before { left: 100%; }
        .btn-submit:active { transform: scale(0.98); }
    </style>
</head>
<body>
    <div class="corner-ornament tl"></div>
    <div class="corner-ornament tr"></div>
    <div class="corner-ornament bl"></div>
    <div class="corner-ornament br"></div>

    <div class="login-container">
        <div class="brand">
            <div class="brand-logo">HYP<span>3</span>R</div>
            <div class="brand-tagline">Colección exclusiva</div>
        </div>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-diamond"></div>
            <div class="divider-line"></div>
        </div>

        <div class="card">
            <div class="card-title">Acceso privado</div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                <div class="flash-messages">
                  {% for categoria, mensaje in messages %}
                    <div class="flash-msg {{ categoria }}">{{ mensaje }}</div>
                  {% endfor %}
                </div>
              {% endif %}
            {% endwith %}

            <form method="post">
                <div class="field">
                    <label>Usuario</label>
                    <input type="text" name="usuario" placeholder="Tu nombre de usuario" required>
                </div>
                <div class="field">
                    <label>Contraseña</label>
                    <input type="password" name="clave" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-submit">Ingresar</button>
            </form>
        </div>
    </div>
</body>
</html>
